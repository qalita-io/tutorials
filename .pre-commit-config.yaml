default_language_version:
  python: python3
exclude: >
  (?x)^(
    node_modules/|
    \.next/|
    dist/|
    build/|
    vendor/|
    \.venv/|
    venv/|
    env/|
    \.git/|
    \.pytest_cache/|
    __pycache__/|
    .*\.min\.js$|
    .*\.min\.css$|
    .*\.pyc$|
    .*\.so$|
    .*\.dll$|
    .*\.exe$
  )
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.3
    hooks:
      - id: gitleaks
        name: Gitleaks protect (staged)
        entry: bash -c 'if command -v gitleaks >/dev/null 2>&1; then gitleaks protect --staged --verbose; else echo "gitleaks not installed, skipping"; fi'
        language: system
        pass_filenames: false
        stages: [pre-commit]
