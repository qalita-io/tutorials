name: Build and Push Docker Image by Digest
description: Build Docker image and push by digest for multi-arch manifests

inputs:
  context:
    description: 'Build context path'
    required: true
  file:
    description: 'Dockerfile path'
    required: true
  platforms:
    description: 'Target platforms (linux/amd64,linux/arm64)'
    required: true
  image-name:
    description: 'Full image name (registry/org/image)'
    required: true
  build-args:
    description: 'Build args (optional)'
    required: false
    default: ''
  github-token:
    description: 'GitHub token'
    required: true

outputs:
  digest:
    description: 'Image digest'
    value: ${{ steps.build.outputs.digest }}

runs:
  using: composite
  steps:
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ inputs.github-token }}

    - name: Build and push by digest
      id: build
      uses: docker/build-push-action@v6
      with:
        context: ${{ inputs.context }}
        file: ${{ inputs.file }}
        platforms: ${{ inputs.platforms }}
        build-args: ${{ inputs.build-args }}
        push: true
        tags: ${{ inputs.image-name }}:platform-${{ inputs.platforms == 'linux/amd64' && 'amd64' || 'arm64' }}-${{ github.run_id }}
        provenance: false
        sbom: false

    - name: Export digest
      shell: bash
      run: |
        digest="${{ steps.build.outputs.digest }}"
        echo "Digest: $digest"
        rm -rf /tmp/digests
        mkdir -p /tmp/digests
        echo "${digest#sha256:}" > /tmp/digests/digest

    - name: Upload digest
      uses: actions/upload-artifact@v4
      with:
        name: digest-${{ inputs.platforms == 'linux/amd64' && 'amd64' || 'arm64' }}-${{ github.run_id }}
        path: /tmp/digests/digest
        if-no-files-found: error
        retention-days: 1

    - name: Upload digest
      uses: actions/upload-artifact@v4
      with:
        name: digests-${{ inputs.platforms == 'linux/amd64' && 'amd64' || 'arm64' }}
        path: /tmp/digests/*
        if-no-files-found: error
        retention-days: 1
