name: Cleanup Old Packages
description: Delete old container package versions from GitHub Container Registry

inputs:
  package-name:
    description: 'Package name (defaults to repository name)'
    required: false
    default: ${{ github.event.repository.name }}
  min-versions-to-keep:
    description: 'Minimum versions to keep'
    required: false
    default: '10'
  github-token:
    description: 'GitHub token'
    required: true

runs:
  using: composite
  steps:
    - name: Delete old container versions
      uses: actions/delete-package-versions@v4
      with:
        package-name: ${{ inputs.package-name }}
        package-type: container
        min-versions-to-keep: ${{ inputs.min-versions-to-keep }}
        delete-only-untagged-versions: false
        token: ${{ inputs.github-token }}
