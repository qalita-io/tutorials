name: Lint Python Code
description: Run Black and Pylint on Python code

inputs:
  source-dir:
    description: 'Source directory (e.g., src/ or .)'
    required: false
    default: '.'
  python-version:
    description: 'Python version'
    required: false
    default: '3.13'

runs:
  using: composite
  steps:
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install black pylint

    - name: Run Black (format check)
      shell: bash
      run: black --check ${{ inputs.source-dir }}

    - name: Run Pylint
      shell: bash
      run: pylint ${{ inputs.source-dir }} || true
