name: Create Multi-Arch Manifests
description: Download digests and create multi-arch manifest

inputs:
  image-name:
    description: 'Full image name (registry/org/image)'
    required: true
  tag:
    description: 'Image tag'
    required: true
  is-latest:
    description: 'Also create :latest tag (true/false)'
    required: false
    default: 'false'
  github-token:
    description: 'GitHub token'
    required: true

runs:
  using: composite
  steps:
    - name: Clean up old digests
      shell: bash
      run: rm -rf /tmp/digests

    - name: Download digests
      uses: actions/download-artifact@v4
      with:
        path: /tmp/digests
        pattern: digest-*
        merge-multiple: true

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ inputs.github-token }}

    - name: Create manifest
      shell: bash
      run: |
        TAG="${{ inputs.tag }}"
        IMAGE="${{ inputs.image-name }}"
        
        echo "Debug: Creating manifest for $IMAGE:$TAG"
        
        # Create multi-arch manifest using the tagged images
        docker buildx imagetools create -t ${IMAGE}:${TAG} \
          ${IMAGE}:platform-amd64-${{ github.run_id }} \
          ${IMAGE}:platform-arm64-${{ github.run_id }}
        
        if [ "${{ inputs.is-latest }}" == "true" ]; then
          docker buildx imagetools create -t ${IMAGE}:latest \
            ${IMAGE}:platform-amd64-${{ github.run_id }} \
            ${IMAGE}:platform-arm64-${{ github.run_id }}
        fi
        
        echo "Manifest created successfully"

    - name: Inspect manifest
      shell: bash
      run: |
        docker buildx imagetools inspect ${{ inputs.image-name }}:${{ inputs.tag }}
