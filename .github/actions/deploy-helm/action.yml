name: Deploy with Helm
description: Deploy to Kubernetes using Helm

inputs:
  chart-path:
    description: 'Path to Helm chart'
    required: false
    default: '.'
  release-name:
    description: 'Helm release name'
    required: true
  namespace:
    description: 'Kubernetes namespace'
    required: true
  values-file:
    description: 'Values file (e.g., prod-values.yaml)'
    required: false
    default: ''
  environment:
    description: 'GitHub environment (for deployment protection)'
    required: false
    default: ''
  infisical-client-id:
    description: 'Infisical Client ID'
    required: true
  infisical-client-secret:
    description: 'Infisical Client Secret'
    required: true

runs:
  using: composite
  steps:
    - name: Fetch Infisical secrets
      uses: Infisical/secrets-action@v1.0.16
      with:
        method: universal
        client-id: ${{ inputs.infisical-client-id }}
        client-secret: ${{ inputs.infisical-client-secret }}
        project-slug: kubernetes
        env-slug: prod
        domain: https://vault.armandleopold.fr

    - name: Set up Helm
      uses: azure/setup-helm@v4
      with:
        version: "3.18.2"

    - name: Set up kubectl
      uses: azure/setup-kubectl@v4

    - name: Configure kubeconfig
      shell: bash
      run: |
        mkdir -p ~/.kube
        printf '%s' "$kubeconfig" > ~/.kube/config
        chmod 600 ~/.kube/config

    - name: Update Helm dependencies
      shell: bash
      run: helm dependency update ${{ inputs.chart-path }}

    - name: Create namespace if not exists
      shell: bash
      run: kubectl create namespace ${{ inputs.namespace }} 2>/dev/null || true

    - name: Deploy with Helm
      shell: bash
      run: |
        HELM_ARGS=""
        if [ -n "${{ inputs.values-file }}" ]; then
          HELM_ARGS="$HELM_ARGS -f ${{ inputs.values-file }}"
        fi

        helm upgrade --install ${{ inputs.release-name }} ${{ inputs.chart-path }} \
          --namespace ${{ inputs.namespace }} \
          ${HELM_ARGS} \
          --atomic \
          --cleanup-on-fail \
          --timeout 10m

    - name: Show deployed pods
      shell: bash
      run: kubectl get pods -n ${{ inputs.namespace }}

    - name: Cleanup
      if: always()
      shell: bash
      run: rm -f ~/.kube/config
